services:
  admin:
    build: .
    container_name: gw-admin
    hostname: gw-admin
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "9901:9999"
    networks:
      meshnet:
        ipv4_address: 172.28.0.10
    volumes:
      - admin-config:/etc/ghostwire
      - ./testdata/mesh-test:/scripts:ro
    entrypoint: ["bash", "-c", "sleep infinity"]

  relay:
    build: .
    container_name: gw-relay
    hostname: gw-relay
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "9902:9999"
    networks:
      meshnet:
        ipv4_address: 172.28.0.20
    volumes:
      - relay-config:/etc/ghostwire
      - ./testdata/mesh-test:/scripts:ro
    entrypoint: ["bash", "-c", "sleep infinity"]
    depends_on:
      - admin

  operator:
    build: .
    container_name: gw-operator
    hostname: gw-operator
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "9903:9999"
    networks:
      meshnet:
        ipv4_address: 172.28.0.30
    volumes:
      - operator-config:/etc/ghostwire
      - ./testdata/mesh-test:/scripts:ro
    entrypoint: ["bash", "-c", "sleep infinity"]
    depends_on:
      - admin

networks:
  meshnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  admin-config:
  relay-config:
  operator-config:
