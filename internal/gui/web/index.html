<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ghostwire</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a; color: #e0e0e0; line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid #222;
        }
        h1 { font-size: 24px; font-weight: 600; }
        .status-badge {
            padding: 6px 12px; border-radius: 4px; font-size: 13px; font-weight: 500;
        }
        .status-connected { background: #0d3320; color: #4ade80; }
        .status-disconnected { background: #3b1818; color: #f87171; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card {
            background: #111; border: 1px solid #222; border-radius: 8px; padding: 20px;
        }
        .card h2 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
        .stat { margin-bottom: 12px; }
        .stat-label { font-size: 13px; color: #666; }
        .stat-value { font-size: 20px; font-weight: 600; color: #fff; }
        .peers-list { list-style: none; }
        .peer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; margin-bottom: 8px; background: #0a0a0a; border-radius: 6px;
        }
        .peer-info { flex: 1; }
        .peer-name { font-weight: 500; color: #fff; }
        .peer-ip { font-size: 13px; color: #666; font-family: monospace; }
        .peer-status { width: 8px; height: 8px; border-radius: 50%; }
        .peer-status.online { background: #4ade80; }
        .peer-status.offline { background: #666; }
        .btn {
            padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 14px; font-weight: 500; transition: all 0.2s;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-danger:hover { background: #b91c1c; }
        .actions { margin-top: 20px; display: flex; gap: 10px; }
        #error { color: #f87171; padding: 10px; background: #3b1818; border-radius: 6px; margin-top: 10px; display: none; }
        .loading { opacity: 0.5; pointer-events: none; }
        footer { margin-top: 40px; padding: 20px 0; border-top: 1px solid #222; text-align: center; color: #666; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ghostwire</h1>
            <span id="status-badge" class="status-badge status-disconnected">Disconnected</span>
        </header>

        <div class="grid">
            <div class="card">
                <h2>Status</h2>
                <div class="stat">
                    <div class="stat-label">Node ID</div>
                    <div class="stat-value" id="node-id">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Mesh IP</div>
                    <div class="stat-value" id="mesh-ip">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Transport</div>
                    <div class="stat-value" id="transport">-</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Uptime</div>
                    <div class="stat-value" id="uptime">-</div>
                </div>
            </div>

            <div class="card">
                <h2>Traffic</h2>
                <div class="stat">
                    <div class="stat-label">Sent</div>
                    <div class="stat-value" id="bytes-sent">0 B</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Received</div>
                    <div class="stat-value" id="bytes-recv">0 B</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Peers</div>
                    <div class="stat-value" id="peer-count">0</div>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h2>Peers</h2>
            <ul class="peers-list" id="peers-list">
                <li class="peer" style="color: #666; justify-content: center;">No peers connected</li>
            </ul>
        </div>

        <div class="actions">
            <button class="btn btn-danger" id="disconnect-btn" style="display: none;">Disconnect</button>
        </div>

        <div id="error"></div>

        <footer>
            ghostwire mesh vpn
        </footer>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        if (!token) {
            document.body.innerHTML = '<div style="padding: 40px; text-align: center; color: #f87171;">Missing auth token</div>';
        }

        let ws = null;
        let reconnectTimeout = null;

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatUptime(seconds) {
            if (seconds < 60) return seconds + 's';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + (seconds % 60) + 's';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return h + 'h ' + m + 'm';
        }

        function updateStatus(status) {
            const badge = document.getElementById('status-badge');
            if (status.connected) {
                badge.textContent = 'Connected';
                badge.className = 'status-badge status-connected';
                document.getElementById('disconnect-btn').style.display = 'block';
            } else {
                badge.textContent = 'Disconnected';
                badge.className = 'status-badge status-disconnected';
                document.getElementById('disconnect-btn').style.display = 'none';
            }

            document.getElementById('node-id').textContent = status.node_id || '-';
            document.getElementById('mesh-ip').textContent = status.mesh_ip || '-';
            document.getElementById('transport').textContent = status.transport || '-';
            document.getElementById('uptime').textContent = status.uptime_seconds ? formatUptime(status.uptime_seconds) : '-';
            document.getElementById('bytes-sent').textContent = formatBytes(status.bytes_sent || 0);
            document.getElementById('bytes-recv').textContent = formatBytes(status.bytes_recv || 0);
            document.getElementById('peer-count').textContent = status.peer_count || 0;
        }

        function updatePeers(peers) {
            const list = document.getElementById('peers-list');
            if (!peers || peers.length === 0) {
                list.innerHTML = '<li class="peer" style="color: #666; justify-content: center;">No peers connected</li>';
                return;
            }

            list.innerHTML = peers.map(peer => `
                <li class="peer">
                    <div class="peer-info">
                        <div class="peer-name">${peer.node_id}</div>
                        <div class="peer-ip">${peer.mesh_ip}${peer.endpoint ? ' via ' + peer.endpoint : ''}</div>
                    </div>
                    <div class="peer-status ${peer.connected ? 'online' : 'offline'}"></div>
                </li>
            `).join('');
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status?token=' + token);
                if (res.ok) {
                    updateStatus(await res.json());
                }
            } catch (e) {
                console.error('Failed to fetch status:', e);
            }
        }

        async function fetchPeers() {
            try {
                const res = await fetch('/api/peers?token=' + token);
                if (res.ok) {
                    updatePeers(await res.json());
                }
            } catch (e) {
                console.error('Failed to fetch peers:', e);
            }
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws?token=${token}`);

            ws.onopen = () => {
                console.log('WebSocket connected');
            };

            ws.onmessage = (event) => {
                try {
                    const lines = event.data.split('\n');
                    for (const line of lines) {
                        if (!line) continue;
                        const msg = JSON.parse(line);
                        if (msg.type === 'status') updateStatus(msg.data);
                        if (msg.type === 'peers') updatePeers(msg.data);
                    }
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                if (reconnectTimeout) clearTimeout(reconnectTimeout);
                reconnectTimeout = setTimeout(connectWebSocket, 2000);
            };

            ws.onerror = (e) => {
                console.error('WebSocket error:', e);
            };
        }

        document.getElementById('disconnect-btn').onclick = async () => {
            try {
                const res = await fetch('/api/disconnect?token=' + token, { method: 'POST' });
                if (!res.ok) throw new Error('Disconnect failed');
            } catch (e) {
                showError('Failed to disconnect: ' + e.message);
            }
        };

        // Initial fetch
        fetchStatus();
        fetchPeers();

        // Connect WebSocket for real-time updates
        connectWebSocket();

        // Periodic refresh as fallback
        setInterval(fetchStatus, 5000);
        setInterval(fetchPeers, 5000);
    </script>
</body>
</html>
