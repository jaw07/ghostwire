# ghostwire on k3s — server + cloudflared connector
#
# Topology:
#   cloudflared (this manifest) connects tunnel ghostwire-k3s (45c0895f-...):
#     - public hostnames gw.dronedocs.net  -> https ghostwire:8443 (enrollment)
#                        gwt.dronedocs.net -> https ghostwire:8444 (HTTPS transport)
#       (ingress is managed remotely via the API — config_src=cloudflare)
#     - private route 10.42.0.0/16 -> WARP clients reach the ghostwire pod IP
#       at L3, carrying UDP 7947 gossip (this is the "WARP Connector" path).
#
# Prereqs (created out-of-band so secrets never live in this file or git):
#   kubectl create namespace ghostwire
#   kubectl -n ghostwire create secret generic ghostwire-cfd-token \
#       --from-file=token=$HOME/.ghostwire-cfd-token
#   kubectl -n ghostwire create secret generic ghostwire-passphrase \
#       --from-literal=passphrase='<your-config-passphrase>'
#
# Image: build for linux/arm64 and push to the gitea registry, e.g.
#   docker buildx build --platform linux/arm64 \
#       -t 192.168.8.119:3000/<owner>/ghostwire:latest --push .
# (then set the image below)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: ghostwire
  labels: { app: cloudflared }
spec:
  replicas: 2 # HA: two connectors for the one tunnel
  selector:
    matchLabels: { app: cloudflared }
  template:
    metadata:
      labels: { app: cloudflared }
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2025.2.0 # multi-arch incl. arm64
          args: ["tunnel", "--no-autoupdate", "--metrics", "0.0.0.0:2000", "run"]
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef: { name: ghostwire-cfd-token, key: token }
          livenessProbe:
            httpGet: { path: /ready, port: 2000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 128Mi }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ghostwire-config
  namespace: ghostwire
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path # k3s default (node-local) — pod is pinned below
  resources:
    requests: { storage: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: ghostwire
  namespace: ghostwire
  labels: { app: ghostwire }
spec:
  clusterIP: None # headless: cloudflared resolves the pod directly
  selector: { app: ghostwire }
  ports:
    - { name: enroll, port: 8443, targetPort: 8443, protocol: TCP }
    - { name: transport, port: 8444, targetPort: 8444, protocol: TCP }
    - { name: gossip, port: 7947, targetPort: 7947, protocol: UDP }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghostwire
  namespace: ghostwire
  labels: { app: ghostwire }
spec:
  replicas: 1 # single server; gossip advertises this pod's IP
  strategy: { type: Recreate } # RWO PVC + single TUN — never two at once
  selector:
    matchLabels: { app: ghostwire }
  template:
    metadata:
      labels: { app: ghostwire }
    spec:
      # Pin to one node so the node-local (local-path) PVC stays reachable.
      nodeSelector:
        kubernetes.io/hostname: user2
      initContainers:
        # One-time mesh bootstrap: only runs `init` if no admin config exists.
        - name: init-config
          image: docker.io/library/ghostwire:dev
          imagePullPolicy: Never
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Stale PID file from a previous pod (always PID 1 in a container)
              # would make `up` think a daemon is already running. Clear it.
              rm -f /etc/ghostwire/ghostwire.pid

              if [ ! -f /etc/ghostwire/admin.enc ]; then
                echo "no admin config — initializing mesh"
                # --advertise: enrolling nodes dial the transport via the
                # Cloudflare tunnel hostname on :443, not the local :8444.
                ghostwire init --mesh-name ghostwire-mesh \
                  --subnet 10.100.0.0/16 \
                  --server-name gwt.dronedocs.net \
                  --listen :8443 \
                  --advertise gwt.dronedocs.net:443 \
                  --output /etc/ghostwire
              else
                echo "admin config present — skipping init"
              fi
              # Enrollment tokens are now minted against the running daemon:
              #   kubectl -n ghostwire exec deploy/ghostwire -c ghostwire -- \
              #     ghostwire token create -c /etc/ghostwire --role operator
          env:
            - name: GHOSTWIRE_PASSPHRASE
              valueFrom:
                secretKeyRef: { name: ghostwire-passphrase, key: passphrase }
          volumeMounts:
            - { name: config, mountPath: /etc/ghostwire }
          resources:
            # init + enroll create do scrypt decrypt AND re-encrypt (2^18, ~256
            # MiB each, can overlap) — needs ~1 GiB headroom.
            requests: { cpu: 100m, memory: 320Mi }
            limits: { memory: 1Gi }
      containers:
        - name: ghostwire
          image: docker.io/library/ghostwire:dev
          imagePullPolicy: Never
          args: ["up", "--foreground", "-c", "/etc/ghostwire"]
          env:
            - name: GHOSTWIRE_PASSPHRASE
              valueFrom:
                secretKeyRef: { name: ghostwire-passphrase, key: passphrase }
            # Flip to "1" once peers are registered to actually drop denied packets.
            - name: GHOSTWIRE_POLICY_ENFORCE
              value: "0"
          ports:
            - { containerPort: 8443, protocol: TCP }
            - { containerPort: 8444, protocol: TCP }
            - { containerPort: 7947, protocol: UDP }
          securityContext:
            capabilities:
              add: ["NET_ADMIN"] # needed for the TUN device + routes
          volumeMounts:
            - { name: config, mountPath: /etc/ghostwire }
            - { name: tun, mountPath: /dev/net/tun }
          resources:
            # scrypt config decryption needs ~256 MiB for the KDF; headroom for
            # an additional concurrent decrypt (e.g. `enroll create` via exec).
            requests: { cpu: 100m, memory: 320Mi }
            limits: { memory: 1Gi }
      volumes:
        - name: config
          persistentVolumeClaim: { claimName: ghostwire-config }
        - name: tun
          hostPath: { path: /dev/net/tun, type: CharDevice }
